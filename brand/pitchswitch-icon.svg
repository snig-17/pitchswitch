<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PitchSwitch icon">
  <defs>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#173a20"/>
      <stop offset="1" stop-color="#0d1f12"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="42%" r="72%">
      <stop offset="52%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="redglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldglow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="tile"><rect x="0" y="0" width="512" height="512" rx="116"/></clipPath>
  </defs>

  <!-- pitch tile -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#pitch)"/>

  <g clip-path="url(#tile)">
    <!-- mowing stripes -->
    <g>
      <rect x="0"   y="0" width="86" height="512" fill="#ffffff" opacity="0.022"/>
      <rect x="171" y="0" width="86" height="512" fill="#ffffff" opacity="0.022"/>
      <rect x="342" y="0" width="86" height="512" fill="#ffffff" opacity="0.022"/>
      <rect x="86"  y="0" width="85" height="512" fill="#000000" opacity="0.05"/>
      <rect x="257" y="0" width="85" height="512" fill="#000000" opacity="0.05"/>
      <rect x="428" y="0" width="84" height="512" fill="#000000" opacity="0.05"/>
    </g>
    <!-- faint pitch markings -->
    <line x1="256" y1="40" x2="256" y2="472" stroke="#cfe8d0" stroke-width="3" opacity="0.10"/>
    <circle cx="256" cy="256" r="150" fill="none" stroke="#cfe8d0" stroke-width="6" opacity="0.10"/>
    <!-- vignette -->
    <rect x="0" y="0" width="512" height="512" fill="url(#vig)"/>
  </g>

  <!-- the cut: red skip-forward (switch to the match that matters) -->
  <g fill="#ff3b3b" filter="url(#redglow)">
    <polygon points="146,170 146,342 240,256"/>
    <polygon points="240,170 240,342 334,256"/>
    <rect x="344" y="170" width="28" height="172" rx="6"/>
  </g>

  <!-- ON AIR tally -->
  <circle cx="410" cy="104" r="13" fill="#ffd400" filter="url(#goldglow)"/>
</svg>
