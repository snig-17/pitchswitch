name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Slim test deps: the suite covers the live path (metrica/coach/personalize)
      # plus the heat model, which needs pandas + statsbombpy. It does NOT need
      # docling/mplsoccer/matplotlib, so we skip the heavy ML deps for fast CI.
      - run: pip install -r requirements.txt statsbombpy pytest pytest-cov
      - run: pytest
